<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow QA matrix</title>
  <desc id="desc">QA matrix for the AI workflow showcase.</desc>
  <rect width="1200" height="675" fill="#111827"/>
  <text x="72" y="86" fill="#f9fafb" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">QA Matrix · AI Workflow</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <rect x="72" y="145" width="1056" height="70" fill="#1f2937" rx="10"/>
    <text x="100" y="188" fill="#e5e7eb" font-weight="700">Gate</text>
    <text x="405" y="188" fill="#e5e7eb" font-weight="700">Status</text>
    <text x="720" y="188" fill="#e5e7eb" font-weight="700">Decision value</text>
    <g fill="#17212c">
      <rect x="72" y="230" width="1056" height="58" rx="8"/>
      <rect x="72" y="302" width="1056" height="58" rx="8"/>
      <rect x="72" y="374" width="1056" height="58" rx="8"/>
      <rect x="72" y="446" width="1056" height="58" rx="8"/>
      <rect x="72" y="518" width="1056" height="58" rx="8"/>
    </g>
    <text x="100" y="267" fill="#f9fafb">Build/test</text><text x="405" y="267" fill="#38bdf8">required</text><text x="720" y="267" fill="#d1d5db">reviewable patch</text>
    <text x="100" y="339" fill="#f9fafb">Verifiability</text><text x="405" y="339" fill="#38bdf8">required</text><text x="720" y="339" fill="#d1d5db">no invented files</text>
    <text x="100" y="411" fill="#f9fafb">Human score</text><text x="405" y="411" fill="#93c5fd">0-5</text><text x="720" y="411" fill="#d1d5db">quality threshold</text>
    <text x="100" y="483" fill="#f9fafb">Correction time</text><text x="405" y="483" fill="#93c5fd">minutes</text><text x="720" y="483" fill="#d1d5db">true cost</text>
    <text x="100" y="555" fill="#f9fafb">Failure reason</text><text x="405" y="555" fill="#facc15">publish redacted</text><text x="720" y="555" fill="#d1d5db">honest limits</text>
  </g>
</svg>
