<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">Mob'ia Job Lifecycle</title>
  <desc id="desc">Public-safe Mob'ia / ccomf-unity job lifecycle.</desc>
  <rect width="1180" height="560" fill="#ffffff"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">Mob'ia / ccomf-unity job lifecycle</text>
  <text x="64" y="104" font-family="Arial, sans-serif" font-size="16" fill="#526070">Product layer for ComfyUI jobs, artifacts, and multi-client review.</text>
  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="74" y="168" width="190" height="100" rx="14" fill="#e9f2ff" stroke="#9bc3ff"/>
    <text x="122" y="208" font-size="20" font-weight="700" fill="#173a66">Request</text>
    <text x="104" y="238" fill="#31516f">product-level intent</text>
    <path d="M270 218 L340 218" stroke="#6b7788" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="355" y="168" width="190" height="100" rx="14" fill="#f0ebff" stroke="#b6a7ef"/>
    <text x="412" y="208" font-size="20" font-weight="700" fill="#3e2d6f">Profile</text>
    <text x="395" y="238" fill="#56477d">pipeline selection</text>
    <path d="M550 218 L620 218" stroke="#6b7788" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="635" y="168" width="190" height="100" rx="14" fill="#fff4df" stroke="#f1bf62"/>
    <text x="694" y="208" font-size="20" font-weight="700" fill="#684509">Job</text>
    <text x="684" y="238" fill="#6f5526">async progress</text>
    <path d="M830 218 L900 218" stroke="#6b7788" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="915" y="168" width="190" height="100" rx="14" fill="#eaf8f0" stroke="#93d3aa"/>
    <text x="970" y="208" font-size="20" font-weight="700" fill="#19562f">Artifact</text>
    <text x="954" y="238" fill="#31513b">review + decision</text>
  </g>
  <rect x="155" y="350" width="870" height="76" rx="16" fill="#172033"/>
  <text x="210" y="397" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Clients: Unity, Android, web. Published here: product map only.</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7788"/>
    </marker>
  </defs>
</svg>
